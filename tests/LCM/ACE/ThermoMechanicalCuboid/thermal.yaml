ALBANY:

  Debug Output:
    Write Jacobian to MatrixMarket: 0
    Write Residual to MatrixMarket: 0
    Write Solution to MatrixMarket: 0

  Problem:
    Name: ACE Thermal 3D
    Solution Method: Transient Tempus
    MaterialDB Filename: './materials_thermal.yaml'

    Dirichlet BCs:
      Time Dependent SDBC on NS z+ for DOF T:
        Number of points: 3
        Time Values: [0.0, 36000.0, 3600000.0]
        BC Values: [270.0, 300.0, 290.0]
      Time Dependent SDBC on NS interval4-erodible for DOF T:
        Number of points: 3
        Time Values: [0.0, 36000.0, 3600000.0]
        BC Values: [270.0, 300.0, 290.0]
      Time Dependent SDBC on NS interval3-erodible for DOF T:
        Number of points: 3
        Time Values: [0.0, 36000.0, 3600000.0]
        BC Values: [270.0, 290.0, 290.0]
      Time Dependent SDBC on NS interval2-erodible for DOF T:
        Number of points: 3
        Time Values: [0.0, 36000.0, 3600000.0]
        BC Values: [270.0, 290.0, 280.0]
      Time Dependent SDBC on NS interval1-erodible for DOF T:
        Number of points: 3
        Time Values: [0.0, 36000.0, 3600000.0]
        BC Values: [270.0, 280.0, 280.0]

    Neumann BCs:
      Time Dependent NBC on SS bottom for DOF T set dudn:
        Number of points: 2
        Time Values: [0.0, 3600000.0]
        BC Values: [[8.0e-02], [8.0e-02]] # [W/m2] geothermal heat flux

    Initial Condition:
      Function: Constant
      Function Data: [270.0]

    Adaptation:
      Method: Erosion
      Rebalance: true
      Equilibrate: false
      Rename Exodus Output: false

    Response Functions:
      Number: 2
      Response 0: Project IP to Nodal Field
      ResponseParams 0:
        Number of Fields: 8
        IP Field Name 0: ACE_Bluff_Salinity
        IP Field Layout 0: Scalar
        IP Field Name 1: ACE_Ice_Saturation
        IP Field Layout 1: Scalar
        IP Field Name 2: ACE_Density
        IP Field Layout 2: Scalar
        IP Field Name 3: ACE_Heat_Capacity
        IP Field Layout 3: Scalar
        IP Field Name 4: ACE_Therm_Cond
        IP Field Layout 4: Scalar
        IP Field Name 5: ACE_Thermal_Inertia
        IP Field Layout 5: Scalar
        IP Field Name 6: ACE_Water_Saturation
        IP Field Layout 6: Scalar
        IP Field Name 7: ACE_Porosity
        IP Field Layout 7: Scalar
        Output to File: true
      Response 1: Solution Average

  Discretization:
    Method: Ioss
    Exodus Input File Name: './cuboid.g'
    Exodus Output File Name: './thermal.e'
    Separate Evaluators by Element Block: true
    Workset Size: -1
    Disable Exodus Output Initial Time: true
    Required Fields Info:
      Number Of Fields: 2
      Field 0:
        Field Name: cell_boundary_indicator
        Field Type: Elem Scalar
        Field Origin: Mesh
      Field 1:
        Field Name: node_boundary_indicator
        Field Type: Node Scalar
        Field Origin: Mesh

  Piro:
    Tempus:
      Integrator Name: Tempus Integrator
      Lump Mass Matrix: true
      Tempus Integrator:
        Integrator Type: Integrator Basic
        Screen Output Index List: '1'
        Screen Output Index Interval: 100
        Stepper Name: Tempus Stepper
        Solution History:
          Storage Type: Unlimited
          Storage Limit: 20
        Time Step Control:
          Initial Time Index: 0
          Final Time Index: 10000000
          Maximum Absolute Error: 1.00000000000000002e-08
          Maximum Relative Error: 1.00000000000000002e-08
          Output Time List: ''
          Output Index List: ''
          Output Index Interval: 1000
          Maximum Number of Stepper Failures: 10
          Maximum Number of Consecutive Stepper Failures: 5
      Tempus Stepper:
        Stepper Type: Forward Euler
      Stratimikos:
        Linear Solver Type: Belos
        Linear Solver Types:
          Belos:
            VerboseObject:
              Verbosity Level: none
            Solver Type: Block GMRES
            Solver Types:
              Block GMRES:
                Convergence Tolerance: 1.00000000000000002e-06
                Output Frequency: 1
                Output Style: 1
                Verbosity: 0
                Maximum Iterations: 3
                Block Size: 1
                Num Blocks: 100
                Flexible Gmres: false
        Preconditioner Type: MueLu
        Preconditioner Types:
          MueLu:
            verbosity: none
          Ifpack2:
            Prec Type: ILUT
            Overlap: 1
            Ifpack2 Settings:
              'fact: ilut level-of-fill': 1.00000000000000000e+00
...
