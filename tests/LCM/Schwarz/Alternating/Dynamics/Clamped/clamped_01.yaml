LCM:
  Scaling:
    Scale: 1.0e0
  Problem:
    Name: Mechanics 3D
    Phalanx Graph Visualization Detail: 0
    MaterialDB Filename: 'material_01.yaml'
    Solution Method: Transient Tempus
    # IC mirrors Norma's clamped: Gaussian Z bump centered at z=0 with
    # amplitude 0.001 m and sigma 0.02 m. The Norma mesh used by this
    # subdomain spans z in [-0.25, 0.5], so the peak sits well inside the
    # domain at the Schwarz-interface side.
    Initial Condition:
      Function: Gaussian Z
      Function Data: [0.001, 0.0, 0.02]
    Initial Condition Dot:
      Function: Constant
      Function Data: [0.0, 0.0, 0.0]
    # Boundary conditions match Norma's clamped-2: clamped on z+ face, free
    # in z at the z- face (Schwarz interface to clamped_00). x and y faces
    # are constrained in their normal direction to suppress rigid-body
    # rotation and lateral motion.
    Dirichlet BCs:
      SDBC on NS nsx- for DOF X: 0.0
      SDBC on NS nsx+ for DOF X: 0.0
      SDBC on NS nsy- for DOF Y: 0.0
      SDBC on NS nsy+ for DOF Y: 0.0
      SDBC on NS nsz+ for DOF Z: 0.0
      SDBC on NS nsz- for DOF StrongSchwarz:
        BC Function: StrongSchwarz
        Coupled Application: clamped_00.yaml
        Coupled Block: coarse
    Response Functions:
      Number: 4
      Response 0: Project IP to Nodal Field
      ResponseParams 0:
        Number of Fields: 1
        IP Field Name 0: Cauchy_Stress
        IP Field Layout 0: Tensor
        Output to File: true
      Response 1: Solution Average
      Response 2: Solution Max Value
      Response 3: Solution Min Value
  Discretization:
    Method: Ioss
    Exodus Input File Name: 'clamped_01.g'
    Exodus Output File Name: 'clamped_01.e'
    Exodus Solution Name: disp
    Exodus Residual Name: resid
    Separate Evaluators by Element Block: true
    Number Of Time Derivatives: 2
    Exodus Write Interval: 10
  Piro:
    Tempus:
      Integrator Name: Tempus Integrator
      Tempus Integrator:
        Integrator Type: Integrator Basic
        Stepper Name: Tempus Stepper
        Solution History:
          Storage Type: Unlimited
          Storage Limit: 2000
        Time Step Control:
          Initial Time Index: 0
          Final Time Index: 1000000
          Output Time List: ''
          Output Index List: ''
      Tempus Stepper:
        Stepper Type: 'Newmark Implicit d-Form'
        Newmark Parameters:
          Beta: 0.25
          Gamma: 0.50
        Solver Name: Demo Solver
        Demo Solver:
          NOX:
            Direction:
              Method: Newton
              Newton:
                Forcing Term Method: Constant
                Rescue Bad Newton Solve: true
                Linear Solver:
                  Tolerance: 1.0e-5
            Line Search:
              Method: Full Step
              Full Step:
                Full Step: 1.0
            Nonlinear Solver: Line Search Based
            Printing:
              Output Precision: 3
              Output Processor: 0
              Output Information:
                Error: true
                Warning: true
                Outer Iteration: true
                Parameters: true
                Details: true
                Linear Solver Details: true
                Stepper Iteration: true
                Stepper Details: true
                Stepper Parameters: true
            Solver Options:
              Status Test Check Type: Minimal
            Status Tests:
              Test Type: Combo
              Combo Type: OR
              Number of Tests: 2
              Test 0:
                Test Type: NormF
                Norm Type: Two Norm
                Scale Type: Scaled
                Tolerance: 1.00000000e-8
              Test 1:
                Test Type: MaxIters
                Maximum Iterations: 128
      Stratimikos:
        Linear Solver Type: Belos
        Linear Solver Types:
          Belos:
            Solver Type: Block GMRES
            Solver Types:
              Block GMRES:
                Convergence Tolerance: 1.00000000e-14
                Output Frequency: 1
                Output Style: 1
                Verbosity: 33
                Maximum Iterations: 100
                Num Blocks: 100
        Preconditioner Type: Ifpack2
        Preconditioner Types:
          Ifpack2:
            Prec Type: ILUT
            Overlap: 1
            Ifpack2 Settings:
              'fact: ilut level-of-fill': 1.0
