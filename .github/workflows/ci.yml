name: CI

on:
  schedule:
    - cron: '0 7 * * *'  # midnight MT (UTC-7) daily
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      LCM_DIR: ${{ github.workspace }}

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libblas-dev libboost-dev libboost-program-options-dev \
          cmake g++ gfortran git \
          libhdf5-openmpi-dev liblapack-dev libnetcdf-dev \
          libopenmpi-dev mpi-default-bin environment-modules \
          libgtest-dev openblas-dev

    - name: Clone Trilinos
      run: |
        git clone -q --depth 1 -b develop \
          https://github.com/trilinos/Trilinos.git $LCM_DIR/Trilinos

    - name: Clone LCM
      uses: actions/checkout@v4
      with:
        path: LCM

    - name: Clone DTK
      run: |
        git clone -q --depth 1 -b dtk-2.0-tpetra-static-graph \
          https://github.com/ikalash/DataTransferKit.git $LCM_DIR/DataTransferKit
        cp -r $LCM_DIR/DataTransferKit $LCM_DIR/Trilinos/

    - name: Build and test
      run: |
        cd $LCM_DIR
        ln -sf LCM/doc/LCM/build/lcm .
        source /usr/share/modules/init/bash
        export MODULEPATH=$LCM_DIR/LCM/doc/LCM/modulefiles:$MODULEPATH
        module load release
        ./lcm all $(nproc)
