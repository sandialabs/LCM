name: CI

on:
  schedule:
    - cron: '0 7 * * *'  # midnight MT (UTC-7) daily
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      LCM_DIR: ${{ github.workspace }}
      OMPI_MCA_rmaps_base_oversubscribe: 1

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libblas-dev libboost-dev libboost-program-options-dev \
          cmake g++ gfortran git \
          libhdf5-openmpi-dev liblapack-dev libnetcdf-dev \
          libopenmpi-dev mpi-default-bin environment-modules \
          libgtest-dev lcov

    - name: Clone Trilinos
      run: |
        git clone -q --depth 1 -b develop \
          https://github.com/trilinos/Trilinos.git $LCM_DIR/Trilinos

    - name: Clone LCM
      uses: actions/checkout@v4
      with:
        path: LCM

    - name: Build and test
      run: |
        cd $LCM_DIR
        ln -sf LCM/doc/LCM/build/lcm .
        source /usr/share/modules/init/bash
        export MODULEPATH=$LCM_DIR/LCM/doc/LCM/modulefiles:$MODULEPATH
        module load release
        # Add coverage flags for LCM only (not Trilinos)
        export LCM_CXX_FLAGS="${LCM_CXX_FLAGS} --coverage"
        export LCM_LINK_FLAGS="--coverage"
        ./lcm all $(nproc) --quiet

    - name: Collect coverage
      if: always()
      run: |
        lcov --capture \
          --directory $LCM_DIR/lcm-build-serial-gcc-release \
          --output-file coverage.info \
          --ignore-errors mismatch,empty
        # Keep only LCM source, exclude Trilinos and test code
        lcov --extract coverage.info '*/LCM/src/*' \
          --output-file coverage_lcm.info \
          --ignore-errors unused,empty
        lcov --list coverage_lcm.info --ignore-errors empty

    - name: Upload to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: coverage_lcm.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
